<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TCG Optimizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f6;
  --surface:#fff;
  --border:#e1e4e8;
  --border2:#c8cdd3;
  --navy:#1a2035;
  --blue:#3a7bd5;
  --blue2:#2d6bc4;
  --text:#1a1d23;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#d97706;
  --shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow2:0 4px 12px rgba(0,0,0,.1);
  --radius:6px;
  --sans:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}

/* NAV */
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-brand{font-size:16px;font-weight:700;color:#fff;white-space:nowrap}
.nav-brand span{color:#e85d2e}
.nav-search{flex:1;max-width:560px;position:relative}
.nav-search input{width:100%;padding:8px 36px 8px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius);color:#fff;font-family:var(--sans);font-size:14px;outline:none;transition:all .15s}
.nav-search input::placeholder{color:rgba(255,255,255,.45)}
.nav-search input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.nav-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);pointer-events:none}
.nav-pills{margin-left:auto;display:flex;gap:2px}
.nav-pill{padding:5px 13px;background:transparent;border:none;border-radius:var(--radius);color:rgba(255,255,255,.65);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nav-pill:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-pill.active{background:rgba(255,255,255,.18);color:#fff}

/* LAYOUT */
.shell{max-width:1100px;margin:0 auto;padding:20px 16px 60px;display:grid;grid-template-columns:250px 1fr;gap:20px;align-items:start}
@media(max-width:720px){.shell{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.box-head{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between}
.box-body{padding:14px}

/* Slots */
.slot{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;background:#fafbfc;transition:border-color .15s;position:relative}
.slot:focus-within{border-color:var(--blue);background:#fff}
.slot-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.slot-row{display:flex;align-items:center;gap:6px}
.slot-name{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;outline:none;min-width:0}
.slot-name::placeholder{color:var(--muted2)}
.slot-rm{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;line-height:1;padding:1px 3px;border-radius:3px;flex-shrink:0}
.slot-rm:hover{color:var(--red)}
.slot-foot{display:flex;align-items:center;gap:6px;margin-top:7px}
.slot-set{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:11px;padding:4px 6px;outline:none;cursor:pointer}
.slot-set:focus{border-color:var(--blue)}
.slot-custom-lnk{font-size:10px;color:var(--blue);cursor:pointer}
.slot-custom-lnk:hover{text-decoration:underline}
.slot-custom-input{width:100%;margin-top:7px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:11px;padding:5px 8px;outline:none}
.slot-custom-input:focus{border-color:var(--blue)}

/* AC dropdown */
.ac{position:absolute;top:calc(100% + 4px);left:-1px;right:-1px;z-index:300;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow2);overflow:hidden}
.ac-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .08s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.hi{background:#f0f6ff}
.ac-img{width:30px;height:42px;object-fit:contain;border-radius:2px;background:var(--bg);flex-shrink:0}
.ac-img-ph{width:30px;height:42px;background:var(--bg);border-radius:2px;flex-shrink:0}
.ac-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-name mark{background:none;color:var(--blue);font-weight:700}
.ac-meta{font-size:10px;color:var(--muted);margin-top:1px}
.ac-price{font-size:11px;font-weight:600;color:var(--green);white-space:nowrap;margin-left:auto}
.ac-msg{padding:9px 12px;font-size:12px;color:var(--muted)}

.add-btn{width:100%;padding:7px;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.add-btn:hover{border-color:var(--blue);color:var(--blue)}
.search-btn{width:100%;padding:10px;background:var(--blue);border:none;border-radius:var(--radius);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.search-btn:hover{background:var(--blue2)}
.search-btn:disabled{opacity:.4;cursor:not-allowed}
#status{font-size:11px;color:var(--muted);margin-top:8px;min-height:14px}
#status.err{color:var(--red)}
#status.ok{color:var(--green)}

/* Condition */
.cond-pills{display:flex;gap:4px;flex-wrap:wrap}
.cp{padding:4px 10px;border:1px solid var(--border2);border-radius:20px;background:transparent;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s}
.cp:hover{border-color:var(--blue);color:var(--blue)}
.cp.active{background:var(--blue);border-color:var(--blue);color:#fff}
.cond-note{font-size:10px;color:var(--muted2);margin-top:6px}

/* File load */
.file-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.file-zone:hover{border-color:var(--blue);background:#f0f6ff}
.file-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-zone-txt{font-size:12px;color:var(--muted);line-height:1.6}
.file-zone-txt strong{color:var(--blue)}

/* MAIN */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tcount{background:var(--bg);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;color:var(--muted)}
.tab.active .tcount{background:var(--blue);color:#fff}

/* Bundle */
.bundle-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.bundle-meta{font-size:12px;color:var(--muted)}
.ftoggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
.ftoggle input{accent-color:var(--blue);cursor:pointer}

.bundle{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.bundle.best{border-color:var(--blue);box-shadow:0 0 0 2px rgba(58,123,213,.15)}
.bundle-head{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.bundle-rank{font-size:12px;font-weight:700;color:var(--muted);min-width:24px}
.bundle-seller{font-size:15px;font-weight:700;color:var(--navy);flex:1}
.best-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.bundle-total{font-size:20px;font-weight:700;color:var(--green)}
.bundle-breakdown{font-size:11px;color:var(--muted);margin-left:4px}
.ship-all{background:#dcfce7;color:#15803d;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px}
.ship-some{background:#fef3c7;color:#92400e;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px}

.bundle-rows{background:var(--bg)}
.bundle-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.bundle-row:last-child{border-bottom:none}
.brow-img{width:36px;height:50px;object-fit:contain;border-radius:2px;background:var(--bg);flex-shrink:0}
.brow-img-ph{width:36px;height:50px;background:var(--bg);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:18px}
.brow-info{flex:1;min-width:0}
.brow-name{font-size:13px;font-weight:600;color:var(--text)}
.brow-set{font-size:11px;color:var(--muted)}
.brow-price{font-size:15px;font-weight:700;color:var(--green);white-space:nowrap}
.brow-cond{font-size:11px;color:var(--muted);margin-top:2px}
.brow-ship{margin-top:2px}
.brow-link{font-size:11px;color:var(--blue);text-decoration:none;display:inline-block;margin-top:3px}
.brow-link:hover{text-decoration:underline}

/* Sellers table */
.stoolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:3px 10px;border:1px solid var(--border2);border-radius:20px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;background:#fff;transition:all .12s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);font-size:12px;overflow:hidden}
thead th{background:#f8f9fa;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8f9fa}
td{padding:9px 12px;vertical-align:middle}
.td-seller{font-size:13px;font-weight:600;color:var(--navy)}
.td-price{font-size:14px;font-weight:700;color:var(--green)}
.td-landed{font-size:10px;color:var(--muted);margin-top:1px}
.td-link{color:var(--blue);text-decoration:none;font-size:11px}
.td-link:hover{text-decoration:underline}

/* Condition badges */
.cond{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.nm{background:#dcfce7;color:#15803d}
.lp{background:#d1fae5;color:#065f46}
.mp{background:#fef3c7;color:#92400e}
.hp{background:#fee2e2;color:#b91c1c}
.dmg{background:#fce7f3;color:#9d174d}

/* Shipping */
.sh{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.sh-ok{background:#dcfce7;color:#15803d}
.sh-thr{background:#fef3c7;color:#92400e}
.sh-pay{background:#f3f4f6;color:#6b7280}

/* Print badge */
.pb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;background:#ede9fe;color:#7c3aed;margin-top:2px}

/* Export */
.export-row{display:flex;gap:8px;margin-top:14px}
.exp-btn{padding:6px 13px;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.exp-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.7}
.empty code{background:var(--bg);padding:2px 6px;border-radius:3px;font-size:12px}

/* Spinner */
.spin{display:inline-block;width:10px;height:10px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes rot{to{transform:rotate(360deg)}}

/* Setup */
.setup-row{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
.setup-row:last-child{border-bottom:none}
.setup-text{flex:1}
.setup-name{font-size:12px;font-weight:600;margin-bottom:2px}
.setup-fix{font-size:11px;color:var(--muted);line-height:1.6}
.setup-fix code{background:var(--bg);padding:1px 5px;border-radius:3px;font-size:10px}
.setup-fix a{color:var(--blue);text-decoration:none}
.sdone{padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;flex-shrink:0;white-space:nowrap;transition:all .12s}
.sdone.todo{background:var(--blue);border-color:var(--blue);color:#fff}
.sdone.done{background:#f3f4f6;border-color:var(--border2);color:var(--muted)}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">TCG<span>Optimizer</span></div>
  <div class="nav-search">
    <input id="navSearch" type="text" placeholder="Search cards…" autocomplete="off"/>
    <svg class="nav-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
  <div class="nav-pills"><span style="font-size:12px;color:rgba(255,255,255,.6);font-weight:500">Magic: The Gathering</span></div>
</nav>

<div class="shell">
<aside class="sidebar">

  <div class="box">
    <div class="box-head">
      Card List
      <span style="font-size:10px;font-weight:400;color:var(--muted)">ALL must match</span>
    </div>
    <div class="box-body">
      <div id="slots"></div>
      <button class="add-btn" id="addBtn">+ Add card</button>
      <button class="search-btn" id="searchBtn">Search TCGPlayer</button>
      <div id="status"></div>
    </div>
  </div>

  <div class="box">
    <div class="box-head">Minimum Condition</div>
    <div class="box-body">
      <div class="cond-pills">
        <button class="cp active" data-c="">Any</button>
        <button class="cp" data-c="NM">NM</button>
        <button class="cp" data-c="LP">LP+</button>
        <button class="cp" data-c="MP">MP+</button>
        <button class="cp" data-c="HP">HP+</button>
      </div>
      <div class="cond-note" id="condNote">Showing all conditions</div>
    </div>
  </div>

  <div class="box">
    <div class="box-head">Load Results</div>
    <div class="box-body">
      <div class="file-zone">
        <input type="file" id="fileInput" accept=".json"/>
        <div class="file-zone-txt">
          <strong>Choose file</strong> or drop here<br>
          Load <code>data/results.json</code> from scraper<br>
          or <code>catalog/mtg/index.json</code>
        </div>
      </div>
    </div>
  </div>

  <div class="box" id="setupBox">
    <div class="box-head">
      Setup
      <div style="display:flex;gap:8px;align-items:center">
        <span id="resetSetup" style="font-size:10px;color:var(--muted2);cursor:pointer;text-decoration:underline">reset</span>
        <button id="collapseSetup" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer">hide</button>
      </div>
    </div>
    <div id="setupRows"></div>
  </div>

</aside>

<main>
  <div id="main"></div>
</main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const G = {
  game: 'mtg',
  slots: [],
  catalog: [],
  products: [], sellers: [], combos: [], searchKeys: [],
  tab: 'bundles',
  filterCard: null,
  filterShip: false,
  minCond: '',
};

const MTG_SETS = ["Alpha","Beta","Unlimited","Revised","4th Edition","5th Edition","6th Edition","7th Edition","8th Edition","9th Edition","10th Edition","Arabian Nights","Antiquities","Legends","The Dark","Fallen Empires","Ice Age","Homelands","Alliances","Mirage","Visions","Weatherlight","Tempest","Stronghold","Exodus","Urza's Saga","Urza's Legacy","Urza's Destiny","Mercadian Masques","Nemesis","Prophecy","Invasion","Planeshift","Apocalypse","Odyssey","Torment","Judgment","Onslaught","Legions","Scourge","Mirrodin","Darksteel","Fifth Dawn","Champions of Kamigawa","Ravnica","Innistrad","Return to Ravnica","Theros","Khans of Tarkir","Battle for Zendikar","Shadows over Innistrad","Kaladesh","Amonkhet","Ixalan","Guilds of Ravnica","War of the Spark","Throne of Eldraine","Ikoria","Kaldheim","Strixhaven","Innistrad: Midnight Hunt","Kamigawa: Neon Dynasty","Streets of New Capenna","The Brothers' War","March of the Machine","Wilds of Eldraine","The Lost Caverns of Ixalan","Murders at Karlov Manor","Outlaws of Thunder Junction","Bloomburrow","Duskmourn","Modern Horizons","Modern Horizons 2","Modern Horizons 3","Commander","Double Masters","Jumpstart"];
const sets = () => MTG_SETS;

// ── Init ───────────────────────────────────────────────────────────────────
addSlot(); addSlot();
renderSlots(); renderSetup(); renderMain();

// MTG only — no game switching

// ── Slots ──────────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', () => { addSlot(); renderSlots(); });
function addSlot() { G.slots.push({ name:'', set:'', custom:'', useCustom:false }); }
function removeSlot(i) { G.slots.splice(i,1); if(!G.slots.length) addSlot(); renderSlots(); }
function toggleCustom(i) { G.slots[i].useCustom = !G.slots[i].useCustom; renderSlots(); }

function buildSetOptions(selectedSet) {
  return sets().map(function(x) {
    return '<option value="' + esc(x) + '"' + (selectedSet===x?' selected':'') + '>' + esc(x) + '</option>';
  }).join('');
}

function renderSlots() {
  var html = '';
  for (var i = 0; i < G.slots.length; i++) {
    var s = G.slots[i];
    var rmBtn = G.slots.length > 1 ? '<button class="slot-rm" onclick="removeSlot('+i+')">×</button>' : '';
    var footer = '';
    if (s.useCustom) {
      footer = '<input class="slot-custom-input" type="text" placeholder="e.g. Alpha, Extended Art, Base Set 1st Edition…" value="' + esc(s.custom) + '" oninput="G.slots['+i+'].custom=this.value"/>' +
               '<span class="slot-custom-lnk" onclick="toggleCustom('+i+')">↩ Use set dropdown</span>';
    } else {
      footer = '<div class="slot-foot"><select class="slot-set" onchange="G.slots['+i+'].set=this.value"><option value="">Any set</option>' +
               buildSetOptions(s.set) + '</select></div>' +
               '<span class="slot-custom-lnk" onclick="toggleCustom('+i+')">✎ Custom version</span>';
    }
    html += '<div class="slot" id="slot' + i + '">' +
            '<div class="slot-lbl">Card ' + (i+1) + '</div>' +
            '<div class="slot-row" style="position:relative">' +
            '<input class="slot-name" type="text" placeholder="Card name…" value="' + esc(s.name) + '" autocomplete="off"' +
            ' oninput="onInput(' + i + ',this.value)"' +
            ' onkeydown="onKey(event,' + i + ')"' +
            ' onblur="schedClose(' + i + ')"' +
            ' onfocus="if(this.value.length>=2)onInput(' + i + ',this.value)"/>' +
            rmBtn +
            '<div class="ac" id="ac' + i + '" style="display:none"></div>' +
            '</div>' + footer + '</div>';
  }
  document.getElementById('slots').innerHTML = html;
}

// ── Autocomplete ───────────────────────────────────────────────────────────
const AT={}, AF={}, AR={};

async function onInput(i, val) {
  G.slots[i].name = val;
  const d = document.getElementById(`ac${i}`);
  if (!d) return;
  if (val.length < 2) { d.style.display='none'; return; }
  clearTimeout(AT[i]);
  AT[i] = setTimeout(() => fetchAC(i, val), 260);
}

async function fetchAC(i, q) {
  const d = document.getElementById(`ac${i}`); if (!d) return;
  d.innerHTML = `<div class="ac-msg"><span class="spin"></span>Searching…</div>`;
  d.style.display = 'block';
  const ql = q.toLowerCase();
  let results = [];

  // Local catalog first
  if (G.catalog.length) {
    results = G.catalog
      .filter(p => p.name.toLowerCase().includes(ql) || (p.clean||'').toLowerCase().includes(ql))
      .slice(0,12).map(p => ({
        name: p.name,
        base: p.name.replace(/\s*\(.*?\)\s*$/,'').trim(),
        set: p.set||'', image: p.image||'',
        price: mktPrice(p.prices),
        printing: getPrinting(p.name),
      }));
  }

  // Fallback APIs
  if (!results.length) {
    try {
      if (G.game === 'mtg') {
        const r = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(q)}&include_extras=true`);
        const j = await r.json();
        results = (j.data||[]).map(n=>({name:n,base:n.replace(/\s*\(.*?\)\s*$/,'').trim(),set:'',image:'',price:null,printing:getPrinting(n)}));
      }
    } catch(e) {}
  }

  AR[i] = results; AF[i] = -1;
  renderAC(i, q, results);
}

function mktPrice(prices) {
  if (!prices) return null;
  for (const sub of Object.values(prices)) {
    const nm = sub['Near Mint']||sub['NM'];
    if (nm?.market) return nm.market;
  }
  return null;
}

function getPrinting(name) {
  const m = name.match(/\(([^)]+)\)\s*$/);
  if (!m) return '';
  const t = m[1].toLowerCase();
  const kw = ['extended art','borderless','showcase','foil','etched','gilded','textured','surge','galaxy','serialized','retro','full art','alternate art','illustration rare','hyper rare','rainbow','secret rare','reverse holo','holofoil','1st edition','shadowless'];
  return kw.some(k=>t.includes(k)) ? m[1] : '';
}

function renderAC(i, q, results) {
  const d = document.getElementById(`ac${i}`); if (!d) return;
  if (!results.length) { d.innerHTML=`<div class="ac-msg">No results</div>`; d.style.display='block'; return; }
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  d.innerHTML = results.slice(0,10).map(function(r,idx) {
    var hl = r.name.replace(re,'<mark>$1</mark>');
    var pr = r.price ? '<span class="ac-price">$' + r.price.toFixed(2) + '</span>' : '';
    var pb = r.printing ? '<span class="pb" style="margin-right:3px">' + esc(r.printing) + '</span>' : '';
    var img = r.image
      ? '<img class="ac-img" src="' + esc(r.image) + '" loading="lazy" onerror="this.style.display='none'"/>'
      : '<div class="ac-img-ph"></div>';
    return '<div class="ac-item" onmousedown="selAC(' + i + ',' + idx + ')" onmouseover="setAF(' + i + ',' + idx + ')">' +
      img +
      '<div style="flex:1;min-width:0"><div class="ac-name">' + hl + '</div><div class="ac-meta">' + pb + esc(r.set) + '</div></div>' +
      pr + '</div>';
  }).join('');
  d.style.display = 'block';
}

function selAC(i, idx) {
  const r=(AR[i]||[])[idx]; if(!r) return;
  G.slots[i].name = r.base;
  if (!G.slots[i].set && r.set && sets().includes(r.set)) G.slots[i].set = r.set;
  renderSlots(); closeAC(i);
}
function setAF(i,idx){AF[i]=idx;document.querySelectorAll(`#ac${i} .ac-item`).forEach((e,j)=>e.classList.toggle('hi',j===idx));}
function onKey(e,i){
  const d=document.getElementById(`ac${i}`),items=AR[i]||[],vis=d&&d.style.display!=='none';
  if(e.key==='ArrowDown'){e.preventDefault();if(!vis)return;AF[i]=Math.min((AF[i]??-1)+1,Math.min(items.length,10)-1);setAF(i,AF[i]);}
  else if(e.key==='ArrowUp'){e.preventDefault();AF[i]=Math.max((AF[i]??0)-1,0);setAF(i,AF[i]);}
  else if(e.key==='Enter'){if(vis&&AF[i]>=0&&items[AF[i]]){e.preventDefault();selAC(i,AF[i]);}}
  else if(e.key==='Escape')closeAC(i);
}
function closeAC(i){const d=document.getElementById(`ac${i}`);if(d)d.style.display='none';}
function schedClose(i){setTimeout(()=>closeAC(i),180);}

// Nav search mirrors slot 0
document.getElementById('navSearch').addEventListener('input', e => {
  if (G.slots.length) { G.slots[0].name=e.target.value; renderSlots(); }
});

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', async () => {
  const valid = G.slots.filter(s=>s.name.trim());
  if (!valid.length) { setStatus('Add at least one card name.','err'); return; }
  setStatus('<span class="spin"></span>Calling local proxy…');
  document.getElementById('searchBtn').disabled = true;
  const params = valid.map(s=>{
    const ed = s.useCustom ? s.custom : s.set;
    return `card=${encodeURIComponent(s.name.trim()+(ed?':'+ed:''))}`;
  }).join('&');
  try {
    const res = await fetch(`http://localhost:7331/search?${params}&game=${G.game}`);
    if (!res.ok) throw new Error(`${res.status}`);
    loadData(await res.json());
    setStatus(`Done. ${G.combos.length} seller bundle(s) found.`,'ok');
  } catch(e) {
    setStatus(`Proxy not running — use file loader instead. (${e.message})`,'err');
  } finally { document.getElementById('searchBtn').disabled=false; }
});

// ── File loader ────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if (data.index) {
        G.catalog=data.index;
        setStatus(`Catalog: ${G.catalog.length.toLocaleString()} cards ready.`,'ok');
      } else {
        loadData(data);
        setStatus(`${G.products.length} card(s) · ${G.sellers.length} listing(s) · ${G.combos.length} bundle(s).`,'ok');
      }
    } catch { setStatus('Failed to parse JSON.','err'); }
  };
  r.readAsText(file);
});

function loadData(data) {
  G.products   = data.products||data.cards||[];
  G.sellers    = data.sellers||[];
  G.combos     = data.combos||[];
  G.searchKeys = data.search_keys||[...new Set(G.sellers.map(s=>s.search_key))];
  G.tab='bundles'; G.filterCard=null;
  renderMain();
}

// ── Condition ──────────────────────────────────────────────────────────────
const CRANK={nm:5,'near mint':5,lp:4,'lightly played':4,mp:3,'moderately played':3,hp:2,'heavily played':2,damaged:1,d:1};
const CMIN={'':0,NM:5,LP:4,MP:3,HP:2};
const CNOTE={'':'Showing all conditions',NM:'Near Mint only',LP:'Lightly Played or better',MP:'Moderately Played or better',HP:'Heavily Played or better'};
function condRank(s){const v=(s||'').toLowerCase();for(const[k,r]of Object.entries(CRANK))if(v.includes(k))return r;return 3;}
function meetsMin(c){return!G.minCond||condRank(c)>=CMIN[G.minCond];}

document.querySelectorAll('.cp').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.cp').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); G.minCond=b.dataset.c;
  document.getElementById('condNote').textContent=CNOTE[G.minCond];
  if(G.products.length||G.combos.length) renderMain();
}));

// ── Render ─────────────────────────────────────────────────────────────────
function renderMain() {
  const el=document.getElementById('main');
  if (!G.products.length&&!G.combos.length) { el.innerHTML=renderWelcome(); return; }
  el.innerHTML=`
    <div class="tabs">
      <button class="tab${G.tab==='bundles'?' active':''}" onclick="switchTab('bundles')">Bundle Finder <span class="tcount" id="tc-b">${G.combos.length}</span></button>
      <button class="tab${G.tab==='sellers'?' active':''}" onclick="switchTab('sellers')">All Listings <span class="tcount" id="tc-s">${G.sellers.length}</span></button>
    </div>
    <div id="tabBody">${renderTab()}</div>`;
}

function switchTab(t) {
  G.tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',
    (t==='bundles'&&b.textContent.includes('Bundle'))||(t==='sellers'&&b.textContent.includes('Listing'))));
  document.getElementById('tabBody').innerHTML=renderTab();
}

function renderTab() {
  return G.tab==='bundles' ? renderBundles() : renderSellers();
}

function rerender() { document.getElementById('tabBody').innerHTML=renderTab(); }

// ── Bundles ────────────────────────────────────────────────────────────────
function renderBundles() {
  let combos = G.combos;
  if (G.filterShip) combos=combos.filter(c=>c.all_shipping_covered||c.any_shipping_covered);
  if (G.minCond)    combos=combos.filter(c=>c.listings.every(l=>meetsMin(l.condition)));

  const bar=`<div class="bundle-bar">
    <div class="bundle-meta">${combos.length} seller${combos.length!==1?'s':''} carry all cards · cheapest first</div>
    <label class="ftoggle"><input type="checkbox" ${G.filterShip?'checked':''} onchange="G.filterShip=this.checked;rerender()"> Covered shipping only</label>
  </div>`;

  if (!combos.length) return bar+`<div class="empty">
    <div class="empty-title">No sellers found carrying all cards</div>
    <div class="empty-sub">Try running the scraper with <code>--max-sellers 50</code><br>or broaden the condition filter.</div>
  </div>`;

  return bar+combos.map((c,i)=>{
    const isTop=i===0;
    const shipBadge=c.all_shipping_covered
      ?`<span class="ship-all">✓ All shipping covered</span>`
      :c.any_shipping_covered?`<span class="ship-some">⚡ Some covered</span>`:'';
    const breakdown=c.total_shipping>0
      ?`<span class="bundle-breakdown">+ $${c.total_shipping.toFixed(2)} ship = <strong>$${c.total_landed.toFixed(2)}</strong> total</span>`:'';
    return `<div class="bundle${isTop?' best':''}">
      <div class="bundle-head">
        <span class="bundle-rank">#${i+1}</span>
        <span class="bundle-seller">${esc(c.seller)}</span>
        ${isTop?`<span class="best-badge">BEST DEAL</span>`:''}
        ${shipBadge}
        <span class="bundle-total">$${c.total_price.toFixed(2)}</span>
        ${breakdown}
      </div>
      <div class="bundle-rows">
        ${c.listings.map(l=>`
          <div class="bundle-row">
            ${l.image?`<img class="brow-img" src="${esc(l.image)}" loading="lazy" onerror="this.style.display='none'"/>`:`<div class="brow-img-ph">🃏</div>`}
            <div class="brow-info">
              <div class="brow-name">${esc(l.card_name)}</div>
              <div class="brow-set">${esc(l.set)}</div>
              ${l.printing?`<span class="pb">${esc(l.printing)}</span>`:''}
            </div>
            <div style="text-align:right">
              <div class="brow-price">${esc(l.price)}</div>
              <div class="brow-cond"><span class="${condClass(l.condition)}">${esc(l.condition)}</span></div>
              <div class="brow-ship">${shipFor(l)}</div>
              <a class="brow-link" href="${esc(l.card_url)}" target="_blank" rel="noopener">View on TCGPlayer ↗</a>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('')+exportRow();
}

// ── Sellers ────────────────────────────────────────────────────────────────
function renderSellers() {
  let rows=G.sellers;
  if (G.filterCard) rows=rows.filter(s=>s.card_name===G.filterCard);
  if (G.filterShip) rows=rows.filter(s=>s.shipping_qualifies);
  if (G.minCond)    rows=rows.filter(s=>meetsMin(s.condition));

  const names=[...new Set(G.sellers.map(s=>s.card_name))];
  const toolbar=`<div class="stoolbar">
    <div class="chips">
      ${names.map(n=>`<span class="chip${G.filterCard===n?' on':''}" onclick="G.filterCard=G.filterCard===\`${n}\`?null:\`${n}\`;rerender()">${esc(n)}</span>`).join('')}
      ${G.filterCard?`<span class="chip" onclick="G.filterCard=null;rerender()" style="color:var(--red);border-color:var(--red)">✕ clear</span>`:''}
    </div>
    <label class="ftoggle"><input type="checkbox" ${G.filterShip?'checked':''} onchange="G.filterShip=this.checked;rerender()"> Covered shipping</label>
  </div>`;

  if (!rows.length) return toolbar+`<div class="empty"><div class="empty-title">No listings match</div></div>`;

  return toolbar+`<table>
    <thead><tr><th>Seller</th><th>Price</th><th>Card</th><th>Condition</th><th>Shipping</th><th>Qty</th><th></th></tr></thead>
    <tbody>${rows.map(s=>`<tr>
      <td class="td-seller">${esc(s.seller)}</td>
      <td>
        <div class="td-price">${esc(s.price)}</div>
        ${s.landed_cost&&s.landed_cost!==s.price_float?`<div class="td-landed">${esc(s.landed_display)} landed</div>`:''}
      </td>
      <td>
        <div style="font-weight:600">${esc(s.card_name)}</div>
        <div style="font-size:11px;color:var(--muted)">${esc(s.set)}</div>
        ${s.printing?`<span class="pb">${esc(s.printing)}</span>`:''}
      </td>
      <td><span class="${condClass(s.condition)}">${esc(s.condition)}</span></td>
      <td>${shipFor(s)}</td>
      <td style="color:var(--muted)">${esc(s.quantity)}</td>
      <td><a class="td-link" href="${esc(s.card_url)}" target="_blank" rel="noopener">↗</a></td>
    </tr>`).join('')}</tbody>
  </table>`+exportRow();
}

// ── Welcome ────────────────────────────────────────────────────────────────
function renderWelcome() {
  return `<div class="empty" style="padding:80px 20px">
    <div class="empty-title">Find the cheapest seller for your whole list</div>
    <div class="empty-sub" style="max-width:400px;margin:0 auto">
      1. Add cards on the left<br>
      2. Run the scraper to get live seller data:<br>
      <code>python scraper.py --cards "Black Lotus:Alpha"</code><br><br>
      3. Load <code>data/results.json</code> here<br><br>
      For card autocomplete with images + prices, first run:<br>
      <code>python sync.py</code><br>
      then load <code>catalog/mtg/index.json</code>
    </div>
  </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function condClass(c=''){
  const v=c.toLowerCase();
  if(v.includes('near')||v.includes('nm'))return'cond nm';
  if(v.includes('lightly')||v.includes('lp'))return'cond lp';
  if(v.includes('moderate')||v.includes('mp'))return'cond mp';
  if(v.includes('heavy')||v.includes('hp'))return'cond hp';
  if(v.includes('damage'))return'cond dmg';
  return'cond';
}
function shipFor(s){
  if(s.shipping_qualifies)return`<span class="sh sh-ok">✓ Covered</span>`;
  if(s.shipping_free_threshold>0)return`<span class="sh sh-thr">Free over $${s.shipping_free_threshold.toFixed(2)}</span>`;
  if(s.shipping_cost>0)return`<span class="sh sh-pay">+$${s.shipping_cost.toFixed(2)}</span>`;
  const raw=s.shipping_display||s.shipping_raw||s.shipping||'';
  if(raw&&raw!=='N/A')return`<span class="sh sh-pay">${esc(raw)}</span>`;
  return`<span class="sh sh-pay">—</span>`;
}
function exportRow(){return`<div class="export-row"><button class="exp-btn" onclick="exportCSV()">Export CSV</button><button class="exp-btn" onclick="exportJSON()">Export JSON</button></div>`;}
function exportCSV(){const rows=[['seller','price','landed','card','set','condition','shipping','qty','url'],...G.sellers.map(s=>[s.seller,s.price,s.landed_display||'',s.card_name,s.set,s.condition,s.shipping_display||s.shipping||'',s.quantity,s.card_url])];dl(rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n'),'tcg_sellers.csv','text/csv');}
function exportJSON(){dl(JSON.stringify({products:G.products,sellers:G.sellers,combos:G.combos},null,2),'tcg_data.json','application/json');}
function dl(text,name,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:mime}));a.download=name;a.click();}
function setStatus(msg,cls=''){const el=document.getElementById('status');el.innerHTML=msg;el.className=cls;}
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Setup ──────────────────────────────────────────────────────────────────
const SETUP=[
  {id:'python',  name:'Python 3.8+',          fix:'<a href="https://www.python.org/downloads/" target="_blank">python.org/downloads</a>'},
  {id:'requests',name:'requests library',      fix:'<code>pip install requests</code>'},
  {id:'pw',      name:'Playwright + Chromium', fix:'<code>pip install playwright && playwright install chromium</code>'},
  {id:'sync',    name:'Catalog synced',        fix:'<code>python sync.py</code> then load <code>catalog/mtg/index.json</code>'},
];
function setupState(){try{return JSON.parse(localStorage.getItem('tcg_s3')||'{}')}catch{return{}}}
function saveSetup(s){try{localStorage.setItem('tcg_s3',JSON.stringify(s))}catch{}}
function renderSetup(){
  const sv=setupState();
  const all=SETUP.every(s=>sv[s.id]);
  document.getElementById('setupRows').innerHTML=SETUP.map(function(s) {
    var done = sv[s.id];
    return '<div class="setup-row">' +
      '<div style="font-size:14px;flex-shrink:0">' + (done?'✅':'⬜') + '</div>' +
      '<div class="setup-text"><div class="setup-name">' + s.name + '</div>' +
      (!done ? '<div class="setup-fix">' + s.fix + '</div>' : '') + '</div>' +
      '<button class="sdone ' + (done?'done':'todo') + '" onclick="toggleSetup('' + s.id + '')">' + (done?'undo':'done') + '</button>' +
      '</div>';
  }).join('');
  // Never auto-hide — always show setup so user knows what's needed
}
function toggleSetup(id){const s=setupState();s[id]=!s[id];saveSetup(s);renderSetup();}
function resetSetup(){const s={};saveSetup(s);renderSetup();}
document.getElementById('resetSetup').addEventListener('click', resetSetup);
let setupHidden=false;
document.getElementById('collapseSetup').addEventListener('click',()=>{
  setupHidden=!setupHidden;
  document.getElementById('setupRows').style.display=setupHidden?'none':'';
  document.getElementById('collapseSetup').textContent=setupHidden?'show':'hide';
});
</script>
